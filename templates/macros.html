{% macro admin_nav(active='') %}

<!-- ── Sidebar Styles ── -->
<style>
  /* Reset body for sidebar layout */
  body {
    margin: 0;
    display: flex;
    min-height: 100vh;
    background: #f0f4f8;
    color: #1a202c;
    font-family: 'Inter', sans-serif;
  }

  /* ── Sidebar ── */
  .admin-sidebar {
    width: 220px;
    min-width: 220px;
    background: linear-gradient(180deg, #1a3560 0%, #2a5298 100%);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 200;
    box-shadow: 3px 0 16px rgba(0,0,0,0.18);
    overflow-y: auto;
    overflow-x: hidden;
  }

  .admin-sidebar::-webkit-scrollbar { width: 3px; }
  .admin-sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  /* Brand */
  .sidebar-brand {
    padding: 20px 18px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  .sidebar-brand-title {
    color: #fff;
    font-size: 0.78rem;
    font-weight: 800;
    line-height: 1.35;
    letter-spacing: 0.01em;
  }
  .sidebar-brand-sub {
    color: rgba(255,255,255,0.5);
    font-size: 0.62rem;
    font-weight: 500;
    margin-top: 2px;
  }

  /* Nav links */
  .sidebar-nav {
    flex: 1;
    padding: 10px 10px 0;
  }
  .sidebar-section-label {
    font-size: 0.58rem;
    font-weight: 700;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: .09em;
    padding: 10px 8px 4px;
  }
  .sidebar-link {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: 8px;
    color: rgba(255,255,255,0.78);
    font-size: 0.8rem;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.14s;
    margin-bottom: 2px;
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: 'Inter', sans-serif;
  }
  .sidebar-link svg {
    width: 15px; height: 15px;
    flex-shrink: 0;
    opacity: 0.75;
  }
  .sidebar-link:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .sidebar-link:hover svg { opacity: 1; }
  .sidebar-link.active { background: rgba(255,255,255,0.18); color: #fff; font-weight: 700; }
  .sidebar-link.active svg { opacity: 1; }
  .sidebar-link.active::before {
    content: '';
    position: absolute;
    left: 0;
    width: 3px; height: 28px;
    background: #63b3ed;
    border-radius: 0 3px 3px 0;
  }
  .sidebar-link { position: relative; }

  /* Dark mode toggle */
  .sidebar-dark-link {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: 8px;
    color: rgba(255,255,255,0.78);
    font-size: 0.8rem;
    font-weight: 500;
    transition: all 0.14s;
    margin-bottom: 2px;
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: 'Inter', sans-serif;
    position: relative;
  }
  .sidebar-dark-link:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .sidebar-dark-icon { font-size: 0.9rem; flex-shrink: 0; width: 15px; text-align: center; }

  /* Bottom actions */
  .sidebar-bottom {
    padding: 12px 10px 16px;
    border-top: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  .sidebar-logout {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 10px;
    border-radius: 8px;
    color: #fff;
    background: #e8a020;
    font-size: 0.78rem;
    font-weight: 700;
    text-decoration: none;
    transition: background 0.14s;
    width: 100%;
  }
  .sidebar-logout:hover { background: #c98a18; }
  .sidebar-logout svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* Main content offset */
  .admin-main-content {
    margin-left: 220px;
    flex: 1;
    min-width: 0;
    width: calc(100% - 220px);
    min-height: 100vh;
    background: #f0f4f8;
    padding: 24px;
    box-sizing: border-box;
  }

  .admin-navbar { display: none !important; }

  .admin-page {
    max-width: 100%;
    margin: 0;
    padding: 0;
  }

  /* ══════════════════════════════════════════
     ADMIN DARK MODE — comprehensive
     ══════════════════════════════════════════ */
  body.dark {
    background: #23272f;
    color: #d5d8de;
  }
  body.dark .admin-main-content { background: #23272f; }
  body.dark .admin-sidebar {
    background: linear-gradient(180deg, #1e222a 0%, #272d38 100%);
    box-shadow: 3px 0 16px rgba(0,0,0,0.35);
  }
  body.dark .sidebar-dark-link { color: rgba(255,255,255,0.9); }

  /* Cards & panels */
  body.dark .card { background: #2b3039; box-shadow: 0 2px 10px rgba(0,0,0,.25); }
  body.dark .card-header { background: linear-gradient(90deg, #344264, #4068a8); }
  body.dark .card-body { background: #2b3039; }

  /* Summary boxes */
  body.dark .summary-box { background: #2b3039; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
  body.dark .summary-num { color: #ebedf0; }
  body.dark .summary-lbl { color: #8b95a5; }
  body.dark .summary-icon.blue   { background: rgba(42,82,152,0.25); }
  body.dark .summary-icon.green  { background: rgba(56,161,105,0.25); }
  body.dark .summary-icon.orange { background: rgba(214,158,46,0.25); }

  /* Announcements */
  body.dark .ann-textarea { background: #1e222a; border-color: #3a4049; color: #d5d8de; }
  body.dark .ann-textarea:focus { border-color: #5b9cf0; box-shadow: 0 0 0 3px rgba(91,156,240,.12); }
  body.dark .ann-textarea::placeholder { color: #6b7280; }
  body.dark .ann-list-title { color: #ebedf0; }
  body.dark .ann-item { border-bottom-color: #32383f; }
  body.dark .ann-dot { background: #5b9cf0; }
  body.dark .ann-meta { color: #6da3e8; }
  body.dark .ann-body { color: #c5c9d2; }
  body.dark .ann-delete { background: rgba(229,62,62,.1); border-color: rgba(229,62,62,.25); color: #fc8181; }
  body.dark .ann-delete:hover { background: #e53e3e; color: #fff; border-color: #e53e3e; }

  /* Stat strip */
  body.dark .stat-strip { border-bottom-color: #32383f; }
  body.dark .stat-strip-item:first-child { border-right-color: #32383f; }
  body.dark .strip-num { color: #6da3e8; }
  body.dark .strip-num.green { color: #4ade80; }
  body.dark .strip-lbl { color: #8b95a5; }

  /* Bar charts */
  body.dark .bar-track { background: #3a4049; }
  body.dark .bar-name.blue { color: #6da3e8; }
  body.dark .bar-name.gray { color: #a0a8b6; }
  body.dark .bar-count { color: #8b95a5; }
  body.dark .section-label { color: #6b7280; }
  body.dark .view-link { color: #6da3e8; }
  body.dark .view-link:hover { color: #93c5fd; }
  body.dark .no-data { color: #6b7280; }
  body.dark .no-lb { color: #6b7280; }

  /* Leaderboard */
  body.dark .lb-row { background: #1e222a; border-color: #3a4049; }
  body.dark .lb-row:hover { background: #252d3d; border-color: #5b9cf0; }
  body.dark .lb-name { color: #ebedf0; }
  body.dark .lb-course { color: #8b95a5; }
  body.dark .view-all-btn { background: #1e222a; border-color: #3a4049; color: #6da3e8; }
  body.dark .view-all-btn:hover { background: #252d3d; border-color: #5b9cf0; }

  /* Flash messages */
  body.dark .flash-success { background: #1a2e23; border-color: #2f6b48; color: #6ee7a0; }
  body.dark .flash-error   { background: #2e1a1a; border-color: #6b2f2f; color: #fc8181; }
  body.dark .flash-info    { background: #1a2233; border-color: #2f4a6b; color: #90cdf4; }
  body.dark .flash-warning { background: #2e2614; border-color: #6b5a1a; color: #fbd38d; }

  /* Modals */
  body.dark .modal { background: #2b3039; box-shadow: 0 20px 60px rgba(0,0,0,.4); }
  body.dark .modal-header { background: linear-gradient(90deg, #1e222a, #2a3350); border-bottom-color: #32383f; color: #ebedf0; }
  body.dark .modal-input { background: #1e222a; border-color: #3a4049; color: #d5d8de; }
  body.dark .modal-input:focus { border-color: #5b9cf0; }
  body.dark .form-group label { color: #a0a8b6; }
  body.dark .result-row { background: #1e222a; border-color: #3a4049; }
  body.dark .result-row:hover { background: #252d3d; }
  body.dark .result-name { color: #ebedf0; }
  body.dark .result-meta { color: #8b95a5; }
</style>

<div class="admin-main-content">

<!-- ── Search Modal ── -->
<div id="searchModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span>Search Student</span>
      <button onclick="closeSearch()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Search by ID or Name</label>
        <input type="text" id="searchInput" class="modal-input" placeholder="Type to search…" oninput="doSearch(this.value)" autocomplete="off"/>
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>
  </div>
</div>

<!-- ── Sit-in Modal ── -->
<div id="sitinModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span>Sit In Form</span>
      <button onclick="closeSitin()">✕</button>
    </div>
    <div class="modal-body">
      <form action="{{ url_for('admin_sitin') }}" method="POST">
        <div class="form-group">
          <label>ID Number</label>
          <input type="text" name="idno" id="sitinIdno" class="modal-input" required oninput="lookupStudent(this.value)"/>
        </div>
        <div class="form-group">
          <label>Student Name</label>
          <input type="text" id="sitinName" class="modal-input" readonly/>
        </div>
        <div class="form-group">
          <label>Purpose</label>
          <select name="purpose" class="modal-input" required>
            <option value="">-- Select Purpose --</option>
            <option>C Programming</option><option>Java</option><option>C#</option>
            <option>ASP.Net</option><option>PHP</option><option>Database</option>
            <option>Research</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Lab</label>
          <select name="lab" class="modal-input" required>
            <option value="">-- Select Lab --</option>
            <option>524</option><option>526</option><option>528</option><option>530</option><option>542</option>
          </select>
        </div>
        <div class="form-group">
          <label>Remaining Session</label>
          <input type="text" id="sitinSession" class="modal-input" readonly/>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeSitin()">Close</button>
          <button type="submit" class="btn btn-primary">Sit In</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
function openSearch() { document.getElementById('searchModal').style.display='flex'; setTimeout(()=>document.getElementById('searchInput').focus(),100); }
function closeSearch() { document.getElementById('searchModal').style.display='none'; document.getElementById('searchResults').innerHTML=''; document.getElementById('searchInput').value=''; }

function doSearch(q) {
  const el = document.getElementById('searchResults');
  if (!q.trim()) { el.innerHTML=''; return; }
  fetch('/admin/search_student?q='+encodeURIComponent(q))
    .then(r=>r.json()).then(students=>{
      if (!students.length) { el.innerHTML='<p class="no-data">No students found.</p>'; return; }
      el.innerHTML = students.map(s=>`
        <div class="result-row" onclick="selectStudent('${s.idno}','${s.name}',${s.remaining_session})">
          <div>
            <div class="result-name">${s.name}</div>
            <div class="result-meta">${s.idno} · ${s.course} Year ${s.level}</div>
          </div>
          <span class="session-badge">${s.remaining_session} sessions</span>
          ${s.already_in ? '<span class="in-badge">IN</span>' : ''}
        </div>`).join('');
    });
}

function selectStudent(idno, name, sessions) {
  closeSearch();
  document.getElementById('sitinIdno').value    = idno;
  document.getElementById('sitinName').value    = name;
  document.getElementById('sitinSession').value = sessions;
  openSitin();
}

function openSitin() { document.getElementById('sitinModal').style.display='flex'; }
function closeSitin() {
  document.getElementById('sitinModal').style.display='none';
  document.getElementById('sitinIdno').value='';
  document.getElementById('sitinName').value='';
  document.getElementById('sitinSession').value='';
}

let _lookupTimer = null;
function lookupStudent(val) {
  clearTimeout(_lookupTimer);
  if (!val.trim()) { document.getElementById('sitinName').value=''; document.getElementById('sitinSession').value=''; return; }
  _lookupTimer = setTimeout(() => {
    fetch('/admin/search_student?q=' + encodeURIComponent(val.trim()))
      .then(r => r.json())
      .then(students => {
        const exact = students.find(s => s.idno === val.trim()) || students[0];
        if (exact) {
          document.getElementById('sitinName').value    = exact.name;
          document.getElementById('sitinSession').value = exact.remaining_session;
        } else {
          document.getElementById('sitinName').value    = 'Student not found';
          document.getElementById('sitinSession').value = '';
        }
      });
  }, 400);
}

// Dark mode
function toggleAdminDark() {
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('adminDark', isDark ? '1' : '0');
  document.querySelectorAll('.admin-dark-btn .sidebar-dark-icon').forEach(b => b.textContent = isDark ? '☀️' : '🌙');
}
(function(){
  if (localStorage.getItem('adminDark') === '1') {
    document.body.classList.add('dark');
    document.querySelectorAll('.admin-dark-btn .sidebar-dark-icon').forEach(b => b.textContent = '☀️');
  }
})();

['searchModal','sitinModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click', e=>{ if(e.target.id===id) document.getElementById(id).style.display='none'; });
});
</script>
{% endmacro %}
