{% macro admin_nav(active='') %}
<nav class="admin-navbar">
  <span class="navbar-brand">College of Computer Studies Admin</span>
  <div class="navbar-menu">
    <a href="{{ url_for('dashboard') }}"           class="nav-link {{ 'active' if active=='home' }}">Home</a>
    <a href="#" onclick="openSearch();return false" class="nav-link {{ 'active' if active=='search' }}">Search</a>
    <a href="{{ url_for('students_list') }}"        class="nav-link {{ 'active' if active=='students' }}">Students</a>
    <a href="{{ url_for('current_sitin') }}"        class="nav-link {{ 'active' if active=='sitin' or active=='current' }}">Sit-in</a>
    <a href="{{ url_for('sitin_records') }}"        class="nav-link {{ 'active' if active=='records' }}">Sit-in Records</a>
    <a href="{{ url_for('feedback_reports') }}"     class="nav-link {{ 'active' if active=='feedback' }}">Feedback Reports</a>
    <a href="{{ url_for('admin_reservations') }}"   class="nav-link {{ 'active' if active=='reservation' }}">Reservation</a>
    <a href="{{ url_for('logout') }}"               class="nav-logout">Log out</a>
  </div>
</nav>

<!-- ── Search Modal ── -->
<div id="searchModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span>Search Student</span>
      <button onclick="closeSearch()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Search by ID or Name</label>
        <input type="text" id="searchInput" class="modal-input" placeholder="Type to search…" oninput="doSearch(this.value)" autocomplete="off"/>
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>
  </div>
</div>

<!-- ── Sit-in Modal ── -->
<div id="sitinModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span>Sit In Form</span>
      <button onclick="closeSitin()">✕</button>
    </div>
    <div class="modal-body">
      <form action="{{ url_for('admin_sitin') }}" method="POST">
        <div class="form-group">
          <label>ID Number</label>
          <input type="text" name="idno" id="sitinIdno" class="modal-input" required/>
        </div>
        <div class="form-group">
          <label>Student Name</label>
          <input type="text" id="sitinName" class="modal-input" readonly/>
        </div>
        <div class="form-group">
          <label>Purpose</label>
          <select name="purpose" class="modal-input" required>
            <option value="">-- Select Purpose --</option>
            <option>C Programming</option><option>Java</option><option>C#</option>
            <option>ASP.Net</option><option>PHP</option><option>Database</option>
            <option>Research</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Lab</label>
          <select name="lab" class="modal-input" required>
            <option value="">-- Select Lab --</option>
            <option>524</option><option>526</option><option>528</option><option>530</option><option>542</option>
          </select>
        </div>
        <div class="form-group">
          <label>Remaining Session</label>
          <input type="text" id="sitinSession" class="modal-input" readonly/>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeSitin()">Close</button>
          <button type="submit" class="btn btn-primary">Sit In</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
function openSearch() { document.getElementById('searchModal').style.display='flex'; setTimeout(()=>document.getElementById('searchInput').focus(),100); }
function closeSearch() { document.getElementById('searchModal').style.display='none'; document.getElementById('searchResults').innerHTML=''; document.getElementById('searchInput').value=''; }

function doSearch(q) {
  const el = document.getElementById('searchResults');
  if (!q.trim()) { el.innerHTML=''; return; }
  fetch('/admin/search_student?q='+encodeURIComponent(q))
    .then(r=>r.json()).then(students=>{
      if (!students.length) { el.innerHTML='<p class="no-data">No students found.</p>'; return; }
      el.innerHTML = students.map(s=>`
        <div class="result-row" onclick="selectStudent('${s.idno}','${s.name}',${s.remaining_session})">
          <div>
            <div class="result-name">${s.name}</div>
            <div class="result-meta">${s.idno} · ${s.course} Year ${s.level}</div>
          </div>
          <span class="session-badge">${s.remaining_session} sessions</span>
          ${s.already_in ? '<span class="in-badge">IN</span>' : ''}
        </div>`).join('');
    });
}

function selectStudent(idno, name, sessions) {
  closeSearch();
  document.getElementById('sitinIdno').value    = idno;
  document.getElementById('sitinName').value    = name;
  document.getElementById('sitinSession').value = sessions;
  openSitin();
}

function openSitin() { document.getElementById('sitinModal').style.display='flex'; }
function closeSitin() { document.getElementById('sitinModal').style.display='none'; }

['searchModal','sitinModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click', e=>{ if(e.target.id===id) document.getElementById(id).style.display='none'; });
});
</script>
{% endmacro %}
