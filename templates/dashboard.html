<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — CCS Sit-in Monitoring System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="dashboard-page">

  <nav class="navbar">
    <span class="navbar-brand">College of Computer Studies Sit-in Monitoring System</span>
    <div class="navbar-links">
      <a href="{{ url_for('dashboard') }}" class="nav-link active">Home</a>
      <a href="{{ url_for('logout') }}"    class="nav-link">Logout</a>
    </div>
  </nav>

  <div class="dashboard-body">
    <h2 style="font-size:1.4rem;font-weight:600;color:#1a1a1a;margin-bottom:8px;">
      Welcome, {{ session.get('student_firstname', 'Student') }} {{ session.get('student_lastname', '') }}!
    </h2>
    <p style="color:#6c757d;font-size:0.9rem;">
      {{ session.get('student_course', '') }} — Year {{ session.get('student_level', '') }}
    </p>
  </div>

</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
